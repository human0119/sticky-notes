<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>雲端便利貼</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; min-height: 100vh; overflow-x: hidden; }
.toolbar { background: #fff; border-bottom: 1px solid #ddd; padding: 10px 14px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 500; }
.toolbar-title { font-size: 16px; font-weight: 700; color: #333; flex: 1; min-width: 60px; }
.status { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #888; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; display: inline-block; }
.dot.err { background: #f87171; }
.dot.loading { background: #fbbf24; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1;}50%{opacity:.3;} }
.save-txt { font-size: 11px; color: #aaa; }
.color-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s; }
.swatch:hover { transform: scale(1.2); }
.swatch.active { border-color: #333 !important; }
.tbtn { padding: 6px 13px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #333; font-size: 13px; cursor: pointer; white-space: nowrap; touch-action: manipulation; }
.tbtn:hover { background: #f5f5f5; }
.tbtn.active { background: #eee; }
.tbtn.primary { background: #333; color: #fff; border-color: #333; }
.board { position: relative; min-height: calc(100vh - 56px); width: 100%; }
.note-card {
  position: absolute;
  border-radius: 3px 14px 14px 14px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 2px 3px 8px rgba(0,0,0,0.10);
  overflow: hidden;
  min-width: 160px;
  min-height: 120px;
}
.note-card.dragging { box-shadow: 4px 6px 18px rgba(0,0,0,0.22); opacity: .95; }
.note-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  cursor: grab;
  flex-shrink: 0;
  touch-action: none;
  user-select: none;
}
.note-header:active { cursor: grabbing; }
.drag-handle { font-size: 15px; opacity: .3; flex-shrink: 0; }
.note-date { font-size: 10px; opacity: .45; flex: 1; }
.note-actions { display: flex; gap: 3px; flex-shrink: 0; }
.icon-btn { background: transparent; border: none; cursor: pointer; font-size: 14px; opacity: .35; padding: 2px 3px; line-height: 1; touch-action: manipulation; }
.icon-btn:hover { opacity: .85; }
.note-textarea {
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-size: 14px;
  line-height: 1.65;
  font-family: inherit;
  flex: 1;
  width: 100%;
  touch-action: auto;
  user-select: text;
}
.note-footer { margin-top: 6px; flex-shrink: 0; }
.reminder-tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(0,0,0,0.07); cursor: pointer; display: inline-block; touch-action: manipulation; }
.reminder-tag.soon { background: #fde68a; color: #78350f; }
.reminder-tag.overdue { background: #fca5a5; color: #7f1d1d; }
.resize-handle {
  position: absolute; right: 0; bottom: 0;
  width: 28px; height: 28px;
  cursor: se-resize;
  touch-action: none;
  user-select: none;
  display: flex; align-items: flex-end; justify-content: flex-end;
  padding: 5px; opacity: .4;
}
.resize-handle:hover { opacity: .9; }
.resize-handle svg { width: 14px; height: 14px; }
.empty { text-align: center; padding: 5rem 1rem; color: #bbb; font-size: 14px; pointer-events: none; }
.empty-icon { font-size: 44px; margin-bottom: 10px; opacity: .35; }
.overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 600; align-items: center; justify-content: center; padding: 1rem; }
.overlay.show { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 1.25rem; width: 100%; max-width: 340px; }
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
.modal label { font-size: 12px; color: #666; display: block; margin-bottom: 3px; margin-top: 10px; }
.modal input { width: 100%; font-size: 14px; padding: 8px 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
.modal input:focus { outline: none; border-color: #888; }
.modal-btns { display: flex; gap: 8px; margin-top: 1rem; }
.modal-btns button { flex: 1; padding: 9px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; font-size: 13px; font-family: inherit; background: #fff; touch-action: manipulation; }
.modal-btns .primary { background: #333; color: #fff; border-color: #333; }
.modal-btns .danger { color: #c00; }
.loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 700; gap: 14px; font-size: 14px; color: #888; }
.spinner { width: 34px; height: 34px; border: 3px solid #ddd; border-top-color: #888; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span>連線 Firebase 中…</span>
</div>

<div class="toolbar">
  <span class="toolbar-title">📝 便利貼</span>
  <div class="status"><span class="dot loading" id="dot"></span><span id="statusTxt">連線中</span></div>
  <span class="save-txt" id="saveTxt"></span>
  <div class="color-row" id="colorRow"></div>
  <button class="tbtn" id="filterBtn" onclick="toggleFilter()">全部</button>
  <button class="tbtn primary" onclick="openAdd()">＋ 新增</button>
</div>

<div class="board" id="board">
  <div class="empty" id="empty" style="display:none;">
    <div class="empty-icon">📝</div>
    <div>按「＋ 新增」建立第一張便利貼</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">新增便利貼</h3>
    <div id="textRow">
      <label>內容（可新增後再輸入）</label>
      <input type="text" id="modalText" placeholder="便利貼內容…" />
    </div>
    <label>提醒時間（選填）</label>
    <input type="datetime-local" id="modalTime" />
    <label>提醒標籤（選填）</label>
    <input type="text" id="modalLabel" placeholder="例：開會、截止日期" />
    <div class="modal-btns">
      <button onclick="closeModal()">取消</button>
      <button class="danger" id="clearBtn" onclick="clearReminder()" style="display:none;">清除提醒</button>
      <button class="primary" onclick="saveModal()">儲存</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDWvqp5BsPCHJbKzJlKVecg1I245Dh6Sxo",
  authDomain: "sticky-notes-dbc67.firebaseapp.com",
  projectId: "sticky-notes-dbc67",
  storageBucket: "sticky-notes-dbc67.firebasestorage.app",
  messagingSenderId: "543077650545",
  appId: "1:543077650545:web:d7ca4aa32b57214ee28bd0"
};

const COLORS = [
  {id:'yellow', bg:'#FFFDE7', dark:'#1a1400', corner:'#FDD835', label:'黃'},
  {id:'orange', bg:'#FFF3E0', dark:'#2a1400', corner:'#FB8C00', label:'橘'},
  {id:'red',    bg:'#FFEBEE', dark:'#2a0a0a', corner:'#E53935', label:'紅'},
  {id:'pink',   bg:'#FCE4EC', dark:'#2a0a18', corner:'#E91E63', label:'粉'},
  {id:'lpink',  bg:'#FFF0F5', dark:'#2a1020', corner:'#F48FB1', label:'淺粉'},
  {id:'purple', bg:'#EDE7F6', dark:'#1a0a40', corner:'#7B1FA2', label:'紫'},
  {id:'blue',   bg:'#E3F2FD', dark:'#042030', corner:'#1E88E5', label:'藍'},
  {id:'lblue',  bg:'#F0F8FF', dark:'#041828', corner:'#90CAF9', label:'淺藍'},
  {id:'green',  bg:'#E8F5E9', dark:'#042a10', corner:'#43A047', label:'綠'},
  {id:'lgreen', bg:'#F1F8F2', dark:'#051a0a', corner:'#A5D6A7', label:'淺綠'},
  {id:'lgray',  bg:'#F5F5F5', dark:'#1a1a1a', corner:'#BDBDBD', label:'淺灰'},
  {id:'lyellow',bg:'#FAFBE8', dark:'#1a1a00', corner:'#E6EE9C', label:'淺黃'},
];

const DEFAULT_W = 300;
const DEFAULT_H = 220;

let notes = [], currentColor = 'yellow', filterActive = false;
let editingId = null, pendingAdd = false;
let db, colRef, zCounter = 10;
let saveTimers = {};

function setStatus(s, txt) {
  document.getElementById('dot').className = 'dot'+(s==='ok'?'':s==='err'?' err':' loading');
  document.getElementById('statusTxt').textContent = txt;
}
function setSave(txt) { document.getElementById('saveTxt').textContent = txt; }

try {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  colRef = collection(db, 'notes');
  const q = query(colRef, orderBy('createdAt', 'desc'));
  onSnapshot(q, snap => {
    notes = snap.docs.map(d => ({id: d.id, ...d.data()}));
    document.getElementById('loadingScreen').style.display = 'none';
    setStatus('ok', 'Firebase 雲端');
    render();
  }, () => { setStatus('err', '讀取失敗'); document.getElementById('loadingScreen').style.display = 'none'; });
} catch(e) { setStatus('err', '連線失敗'); document.getElementById('loadingScreen').style.display = 'none'; }

function nextPos() {
  const bw = document.getElementById('board').clientWidth || window.innerWidth;
  const cols = Math.max(1, Math.floor(bw / (DEFAULT_W + 20)));
  const i = notes.length;
  return { x: 16 + (i % cols) * (DEFAULT_W + 16), y: 16 + Math.floor(i / cols) * (DEFAULT_H + 16) };
}

async function addNote(text, color, reminder, rlabel) {
  const now = new Date();
  const dateStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const pos = nextPos();
  setSave('儲存中…');
  try {
    await addDoc(colRef, { text: text||'', color: color||currentColor, date: dateStr, reminder: reminder||null, rlabel: rlabel||'', fired: false, x: pos.x, y: pos.y, w: DEFAULT_W, h: DEFAULT_H, z: ++zCounter, createdAt: serverTimestamp() });
    setSave('已儲存');
  } catch(e) { setSave('儲存失敗'); }
}

async function updateNote(id, data) {
  try { await updateDoc(doc(db, 'notes', id), data); setSave('已儲存'); }
  catch(e) { setSave('儲存失敗'); }
}

async function deleteNote(id) {
  try { await deleteDoc(doc(db, 'notes', id)); setSave('已刪除'); }
  catch(e) { setSave('刪除失敗'); }
}

function scheduleUpdate(id, data) {
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => updateNote(id, data), 700);
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function reminderClass(n) {
  if (!n.reminder) return '';
  const diff = new Date(n.reminder).getTime() - Date.now();
  if (n.fired || diff < 0) return 'overdue';
  if (diff < 3600000) return 'soon';
  return '';
}

function expandBoard(r, b) {
  const board = document.getElementById('board');
  const need = b + 80;
  if ((parseInt(board.style.minHeight)||0) < need) board.style.minHeight = need + 'px';
}

function bringToFront(id, card) {
  zCounter++;
  card.style.zIndex = zCounter;
  scheduleUpdate(id, {z: zCounter});
}

function makeDraggable(card, noteId) {
  const header = card.querySelector('.note-header');
  let sx, sy, sl, st, active = false;

  function start(cx, cy) {
    active = true;
    sx = cx; sy = cy;
    sl = parseInt(card.style.left)||0;
    st = parseInt(card.style.top)||0;
    card.classList.add('dragging');
    bringToFront(noteId, card);
  }
  function move(cx, cy) {
    if (!active) return;
    const nx = Math.max(0, sl + cx - sx);
    const ny = Math.max(0, st + cy - sy);
    card.style.left = nx + 'px';
    card.style.top = ny + 'px';
    expandBoard(nx + card.offsetWidth, ny + card.offsetHeight);
  }
  function end() {
    if (!active) return;
    active = false;
    card.classList.remove('dragging');
    scheduleUpdate(noteId, {x: parseInt(card.style.left), y: parseInt(card.style.top)});
  }

  header.addEventListener('mousedown', e => { if (e.target.closest('button')) return; e.preventDefault(); start(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  window.addEventListener('mouseup', end);

  header.addEventListener('touchstart', e => {
    if (e.target.closest('button')) return;
    const t = e.touches[0]; start(t.clientX, t.clientY);
  }, {passive: true});
  header.addEventListener('touchmove', e => {
    if (!active) return;
    e.preventDefault();
    const t = e.touches[0]; move(t.clientX, t.clientY);
  }, {passive: false});
  header.addEventListener('touchend', end);
}

function makeResizable(card, noteId) {
  const handle = card.querySelector('.resize-handle');
  let sx, sy, sw, sh, active = false;

  function start(cx, cy) {
    active = true; sx = cx; sy = cy;
    sw = card.offsetWidth; sh = card.offsetHeight;
    bringToFront(noteId, card);
  }
  function move(cx, cy) {
    if (!active) return;
    card.style.width = Math.max(160, sw + cx - sx) + 'px';
    card.style.height = Math.max(120, sh + cy - sy) + 'px';
    expandBoard(parseInt(card.style.left) + card.offsetWidth, parseInt(card.style.top) + card.offsetHeight);
  }
  function end() {
    if (!active) return;
    active = false;
    scheduleUpdate(noteId, {w: card.offsetWidth, h: card.offsetHeight});
  }

  handle.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); start(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => { if (active) move(e.clientX, e.clientY); });
  window.addEventListener('mouseup', () => { if (active) end(); });

  handle.addEventListener('touchstart', e => { e.stopPropagation(); const t = e.touches[0]; start(t.clientX, t.clientY); }, {passive: true});
  handle.addEventListener('touchmove', e => { if (!active) return; e.preventDefault(); const t = e.touches[0]; move(t.clientX, t.clientY); }, {passive: false});
  handle.addEventListener('touchend', end);
}

function render() {
  const board = document.getElementById('board');
  const empty = document.getElementById('empty');
  const show = filterActive ? notes.filter(n => n.reminder) : notes;
  empty.style.display = show.length ? 'none' : 'block';

  const existing = new Set([...board.querySelectorAll('.note-card')].map(el => el.dataset.id));
  const incoming = new Set(show.map(n => n.id));
  existing.forEach(id => { if (!incoming.has(id)) { const el = board.querySelector(`[data-id="${id}"]`); if (el) el.remove(); } });

  show.forEach(note => {
    const c = COLORS.find(c => c.id === note.color) || COLORS[0];
    const w = note.w || DEFAULT_W, h = note.h || DEFAULT_H;
    const x = note.x ?? 16, y = note.y ?? 16;

    let card = board.querySelector(`[data-id="${note.id}"]`);
    if (!card) {
      card = document.createElement('div');
      card.className = 'note-card';
      card.dataset.id = note.id;
      card.innerHTML = `
        <div class="note-header">
          <span class="drag-handle">⠿</span>
          <span class="note-date"></span>
          <div class="note-actions">
            <button class="icon-btn" title="提醒">⏰</button>
            <button class="icon-btn del-btn" title="刪除">✕</button>
          </div>
        </div>
        <textarea class="note-textarea" placeholder="寫點什麼…"></textarea>
        <div class="note-footer"><span class="reminder-tag" style="display:none;"></span></div>
        <div class="resize-handle" title="調整大小">
          <svg viewBox="0 0 10 10" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="2" y1="9" x2="9" y2="2"/><line x1="5.5" y1="9" x2="9" y2="5.5"/>
          </svg>
        </div>`;
      board.appendChild(card);

      const ta = card.querySelector('.note-textarea');
      ta.addEventListener('focus', () => bringToFront(note.id, card));
      ta.addEventListener('input', e => scheduleUpdate(note.id, {text: e.target.value}));
      card.querySelector('.del-btn').addEventListener('click', e => { e.stopPropagation(); if (confirm('確定刪除？')) deleteNote(note.id); });
      card.querySelectorAll('.icon-btn')[0].addEventListener('click', e => { e.stopPropagation(); openEdit(note.id); });
      card.querySelector('.reminder-tag').addEventListener('click', e => { e.stopPropagation(); openEdit(note.id); });
      makeDraggable(card, note.id);
      makeResizable(card, note.id);
    }

    card.style.cssText = `background:${c.bg};color:${c.dark};left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${note.z||10};`;
    card.style.position = 'absolute';
    card.style.borderRadius = '3px 14px 14px 14px';
    card.style.padding = '14px';
    card.style.display = 'flex';
    card.style.flexDirection = 'column';
    card.style.border = '1px solid rgba(0,0,0,0.08)';
    card.style.boxShadow = '2px 3px 8px rgba(0,0,0,0.10)';
    card.style.overflow = 'hidden';
    card.style.minWidth = '160px';
    card.style.minHeight = '120px';

    card.querySelector('.note-date').textContent = note.date || '';
    const ta = card.querySelector('.note-textarea');
    if (ta !== document.activeElement) ta.value = note.text || '';
    ta.style.color = c.dark;

    const rtag = card.querySelector('.reminder-tag');
    const rf = fmtTime(note.reminder);
    if (rf) {
      rtag.textContent = '⏰ ' + (note.rlabel ? note.rlabel+' ' : '') + rf;
      rtag.className = 'reminder-tag ' + reminderClass(note);
      rtag.style.display = 'inline-block';
    } else {
      rtag.style.display = 'none';
    }
    expandBoard(x + w, y + h);
  });
}

function buildPicker() {
  const row = document.getElementById('colorRow');
  COLORS.forEach(c => {
    const b = document.createElement('div');
    b.className = 'swatch' + (c.id===currentColor?' active':'');
    b.style.cssText = `background:${c.bg};outline:1.5px solid ${c.corner};outline-offset:1px;border-color:${c.id===currentColor?'#333':'transparent'};`;
    b.title = c.label;
    b.onclick = () => {
      currentColor = c.id;
      document.querySelectorAll('.swatch').forEach((el, i) => {
        el.classList.toggle('active', COLORS[i].id===currentColor);
        el.style.borderColor = COLORS[i].id===currentColor ? '#333' : 'transparent';
      });
    };
    row.appendChild(b);
  });
}

window.toggleFilter = () => {
  filterActive = !filterActive;
  document.getElementById('filterBtn').textContent = filterActive ? '只看提醒' : '全部';
  document.getElementById('filterBtn').classList.toggle('active', filterActive);
  render();
};

window.openAdd = () => {
  pendingAdd = true; editingId = null;
  document.getElementById('modalTitle').textContent = '新增便利貼';
  document.getElementById('modalText').value = '';
  document.getElementById('modalTime').value = '';
  document.getElementById('modalLabel').value = '';
  document.getElementById('textRow').style.display = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
  if (Notification && Notification.permission==='default') Notification.requestPermission();
};

function openEdit(id) {
  pendingAdd = false; editingId = id;
  const n = notes.find(n => n.id===id);
  document.getElementById('modalTitle').textContent = '設定提醒';
  document.getElementById('textRow').style.display = 'none';
  document.getElementById('modalTime').value = n?.reminder ? n.reminder.slice(0,16) : '';
  document.getElementById('modalLabel').value = n?.rlabel || '';
  document.getElementById('clearBtn').style.display = n?.reminder ? '' : 'none';
  document.getElementById('overlay').classList.add('show');
}

window.closeModal = () => {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('textRow').style.display = '';
  pendingAdd = false; editingId = null;
};

window.saveModal = async () => {
  const t = document.getElementById('modalTime').value;
  const lbl = document.getElementById('modalLabel').value.trim();
  if (pendingAdd) {
    await addNote(document.getElementById('modalText').value.trim(), currentColor, t||null, lbl);
  } else if (editingId) {
    await updateNote(editingId, {reminder: t||null, rlabel: lbl, fired: false});
  }
  closeModal();
};

window.clearReminder = async () => {
  if (editingId) await updateNote(editingId, {reminder: null, rlabel: '', fired: false});
  closeModal();
};

document.getElementById('overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });

setInterval(() => {
  const now = Date.now();
  notes.forEach(n => {
    if (n.reminder && !n.fired && now >= new Date(n.reminder).getTime()) {
      updateNote(n.id, {fired: true});
      if (Notification?.permission==='granted') new Notification('便利貼提醒', {body: (n.rlabel?n.rlabel+'\n':'')+(n.text||'').slice(0,80)});
    }
  });
}, 30000);

buildPicker();
</script>
</body>
</html>
